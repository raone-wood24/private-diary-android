name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buildozer environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-dev build-essential \
            libssl-dev libffi-dev zlib1g-dev \
            git autoconf libtool pkg-config \
            libncurses5-dev libtinfo5 cmake \
            libsqlite3-dev openjdk-17-jdk \
            unzip zip lld

          pip install buildozer cython

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivateDiary-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/android/platform/build-*/**/*.log
          retention-days: 7
